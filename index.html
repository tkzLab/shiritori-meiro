<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>гҒ—гӮҠгҒЁгӮҠ гӮҒгҒ„гӮҚ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@700;900&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:'Zen Maru Gothic',sans-serif;
    background:#bfe6f7;
    min-height:100vh;
    display:flex;align-items:flex-start;justify-content:center;
    overflow-x:hidden;
    touch-action:manipulation;
  }
  /* ===== е…ЁдҪ“гӮ’з”»йқўе№…гҒ«еҗҲгӮҸгҒӣгҒҰжӢЎеӨ§зё®е°Ҹ ===== */
  #stage{transform-origin:top center;}
  .board{
    width:1120px;
    background:repeating-linear-gradient(90deg,#e3f4fc 0px,#e3f4fc 14px,#d2ecfa 14px,#d2ecfa 28px);
    padding:14px 28px 10px;position:relative;
    box-shadow:0 20px 50px rgba(30,110,160,.35);
    border-radius:8px;
    margin:6px auto;
  }

  /* ===== гғҳгғғгғҖгғјпјҲ1иЎҢгҒ«еҸҺгӮҒгҒҰзёҰе№…гӮ’зҜҖзҙ„пјү ===== */
  .head{display:flex;align-items:center;gap:20px;}
  .title{
    font-size:30px;font-weight:900;color:#28aeea;letter-spacing:3px;white-space:nowrap;
    text-shadow:2px 0 0 #fff,-2px 0 0 #fff,0 2px 0 #fff,0 -2px 0 #fff,2px 2px 0 #fff,-2px 2px 0 #fff,2px -2px 0 #fff,-2px -2px 0 #fff,3px 3px 0 rgba(40,174,234,.25);
  }
  .badge{
    background:#5b3a1e;color:#fff;font-size:20px;font-weight:900;letter-spacing:4px;
    padding:4px 30px;border-radius:20px;white-space:nowrap;
  }
  .desc{font-size:17px;font-weight:900;color:#333;letter-spacing:0;white-space:nowrap;margin-left:auto;}

  /* ===== гӮҒгҒ„гӮҚжң¬дҪ“ ===== */
  .maze{position:relative;width:1064px;height:640px;margin-top:6px;
    touch-action:none;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;}
  .maze svg{position:absolute;inset:0;width:100%;height:100%;display:block;overflow:visible;}
  .maze-paths{filter:drop-shadow(0 3px 8px rgba(53,181,234,.45));}
  /* гҒӘгҒһгҒЈгҒҹз·ҡпјҲгҒӢгҒҸгҒҰгҒ„пјү */
  #trace{fill:none;stroke:#ffd23f;stroke-width:var(--tracew,40px);stroke-linecap:round;stroke-linejoin:round;
    filter:drop-shadow(0 0 6px rgba(255,170,0,.7));}
  /* гӮҶгҒігҒ« гҒӨгҒ„гҒҰгҒҸгӮӢз·ҡ */
  #rubber{fill:none;stroke:#ffd23f;stroke-width:var(--tracew,40px);stroke-linecap:round;opacity:.5;
    filter:drop-shadow(0 0 6px rgba(255,170,0,.6));}

  .tab{
    position:absolute;background:#35b5ea;color:#fff;font-size:24px;font-weight:900;
    writing-mode:vertical-rl;padding:14px 6px;border-radius:8px;box-shadow:0 2px 0 rgba(0,0,0,.1);z-index:5;
  }
  .tab.start{left:-10px;top:38px;letter-spacing:6px;}
  .tab.goal{right:-12px;top:448px;letter-spacing:8px;animation:goalPulse 1.3s ease-in-out infinite;}
  @keyframes goalPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}

  /* гғҺгғјгғүпјҲеӨ§гҒҚгҒ•гҒҜзӣӨйқўгҒ”гҒЁгҒ« CSSеӨүж•°гҒ§еҲҮгӮҠжӣҝгҒҲпјү */
  .node{position:absolute;width:var(--nodew,180px);text-align:center;cursor:pointer;z-index:4;
    transition:transform .12s ease;}
  .node .pic{
    width:var(--pic,122px);height:var(--pic,122px);margin:0 auto;border-radius:50%;
    border:3px solid #cdd8e0;background:#fff;overflow:hidden;
    display:flex;align-items:center;justify-content:center;line-height:1;
    box-shadow:0 3px 6px rgba(0,0,0,.12);
    transition:border-color .15s ease, box-shadow .15s ease;
    user-select:none;
  }
  .node .pic img{
    width:100%;height:100%;object-fit:contain;display:block;
    pointer-events:none;-webkit-user-drag:none;user-select:none;
  }
  .node .word{margin-top:4px;display:inline-block;}
  .node .word b{
    background:#ffe27a;border-radius:7px;padding:1px 9px;font-size:var(--wordf,19px);font-weight:900;color:#333;letter-spacing:1px;
    display:inline-block;transition:background-color .15s ease;
  }

  /* зҠ¶ж…Ӣ вҖ” еӨ§гҒҚгҒ•гғ»дҪҚзҪ®гҒҜ гҒӢгҒҲгҒҡгҖҒиүІгҒЁгҒ«гҒҳгӮҖе…үгҒ гҒ‘гҒ§иЎЁзҸҫгҒҷгӮӢ
     пјҲbox-shadow гҒҜгғ¬гӮӨгӮўгӮҰгғҲгҒ«еҪұйҹҝгҒ—гҒӘгҒ„гҒ®гҒ§ зөөгғ»гҒӘгҒҫгҒҲ гҒҜеӢ•гҒӢгҒӘгҒ„пјү */
  .node.done .pic{border-color:#3fbf6a;border-width:4px;
    box-shadow:0 0 14px 1px rgba(63,191,106,.55), 0 3px 6px rgba(0,0,0,.12);}
  .node.done .word b{background:#8ef0aa;}
  .node.current .pic{border-color:#ff8c1a;border-width:4px;
    box-shadow:0 0 16px 2px rgba(255,140,26,.65), 0 3px 6px rgba(0,0,0,.12);
    animation:headGlow 1s ease-in-out infinite;}
  @keyframes headGlow{
    0%,100%{box-shadow:0 0 14px 1px rgba(255,140,26,.5), 0 3px 6px rgba(0,0,0,.12);}
    50%    {box-shadow:0 0 20px 3px rgba(255,140,26,.85), 0 3px 6px rgba(0,0,0,.12);}
  }
  .node.hintable .pic{animation:hintGlow 1s ease-in-out 2;}
  @keyframes hintGlow{
    0%,100%{box-shadow:0 3px 6px rgba(0,0,0,.12);}
    50%    {box-shadow:0 0 22px 4px rgba(255,211,63,.9), 0 3px 6px rgba(0,0,0,.12);}
  }
  .node.wrong .word b{background:#ffb0b0;}

  /* ===== гғ•гғғгӮҝгғј & гӮігғігғҲгғӯгғјгғ« ===== */
  .foot{display:flex;align-items:center;justify-content:space-between;margin-top:6px;}
  .controls{display:flex;gap:12px;}
  .btn{
    font-family:inherit;font-weight:900;font-size:22px;color:#fff;border:none;border-radius:30px;
    padding:12px 30px;cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,.18);transition:transform .1s,box-shadow .1s;
  }
  .btn:active{transform:translateY(3px);box-shadow:0 1px 0 rgba(0,0,0,.18);}
  .btn.hint{background:#ffab2e;}
  .btn.redo{background:#7ac0e8;}
  .credit{font-size:14px;font-weight:700;color:#555;}

  /* гӮҒгҒ„гӮҚеҲҮгӮҠжӣҝгҒҲ */
  .levels{display:flex;align-items:center;gap:9px;}
  .lvlabel{font-weight:900;color:#5b3a1e;font-size:19px;letter-spacing:1px;}
  .lvbtn{
    font-family:inherit;font-weight:900;font-size:20px;height:50px;padding:0 22px;border-radius:26px;
    border:3px solid #35b5ea;background:#fff;color:#35b5ea;cursor:pointer;
    box-shadow:0 4px 0 rgba(0,0,0,.15);transition:transform .1s,box-shadow .1s;
  }
  .lvbtn.on{background:#35b5ea;color:#fff;}
  .lvbtn[data-d="hard"]{border-color:#ef7fa8;color:#ef7fa8;}  /* гӮҖгҒҡгҒӢгҒ—гҒ„пјқгғ”гғігӮҜзӣӨйқўгҒ®иүІ */
  .lvbtn[data-d="hard"].on{background:#ef7fa8;color:#fff;}
  .lvbtn:active{transform:translateY(3px);box-shadow:0 1px 0 rgba(0,0,0,.15);}

  /* гҒ—гӮҠгҒЁгӮҠгғҲгғ©гғғгӮҜпјҲдёӢйғЁгҒ«гҒӮгҒӨгӮҒгҒҹ гҒ“гҒЁгҒ°пјү
     й«ҳгҒ•гҒҢеӨүгӮҸгӮӢгҒЁзӣӨе…ЁдҪ“гҒ®зё®е°әгҒҢзӢӮгҒҶгҒ®гҒ§гҖҒжҠҳгӮҠиҝ”гҒ•гҒҡ1иЎҢеӣәе®ҡгҒ«гҒҷгӮӢгҖӮ
     ж–Үеӯ—гӮөгӮӨгӮәгҒҜзӣӨйқўгҒ® --wordf гҒ«йҖЈеӢ•пјҲ16гғһгӮ№зӣӨгҒҜиӘһж•°гҒҢеӨҡгҒ„гҒ¶гӮ“е°ҸгҒ•гҒҸпјү */
  .track{
    display:flex;align-items:center;gap:6px;flex-wrap:nowrap;overflow:hidden;margin:2px 0 0;height:40px;
  }
  .track .chip{
    background:#fff;border:2px solid #ffd23f;border-radius:20px;padding:2px 12px;
    font-size:var(--wordf,20px);font-weight:900;color:#c47a00;white-space:nowrap;flex:0 0 auto;
    animation:pop .3s ease;
  }
  .track .arrow{color:#8aa;font-weight:900;font-size:var(--wordf,18px);flex:0 0 auto;}
  @keyframes pop{0%{transform:scale(.3);opacity:0}100%{transform:scale(1);opacity:1}}

  /* ===== еӢқеҲ©гӮӘгғјгғҗгғјгғ¬гӮӨ ===== */
  #win{
    position:fixed;inset:0;background:rgba(20,120,180,.55);backdrop-filter:blur(3px);
    display:none;align-items:center;justify-content:center;z-index:50;
  }
  #win.show{display:flex;animation:fade .3s;}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .winbox{
    background:#fff;border-radius:30px;padding:40px 60px;text-align:center;
    box-shadow:0 20px 60px rgba(0,0,0,.35);border:8px solid #ffd23f;animation:bounceIn .5s;
  }
  @keyframes bounceIn{0%{transform:scale(.4)}60%{transform:scale(1.1)}100%{transform:scale(1)}}
  .winbox .big{font-size:74px;font-weight:900;color:#ff8c1a;letter-spacing:4px;
    text-shadow:3px 3px 0 #ffe27a;}
  .winbox .stars{font-size:60px;margin:6px 0;}
  .winbox .sub{font-size:26px;font-weight:900;color:#3fbf6a;margin-bottom:18px;}
  .winbox .btn{background:#3fbf6a;font-size:28px;padding:14px 46px;}

  .confetti{position:fixed;top:-20px;width:12px;height:16px;z-index:60;pointer-events:none;border-radius:2px;}
</style>
</head>
<body>
<div id="stage">
  <div class="board">

    <!-- гғҳгғғгғҖгғј -->
    <div class="head">
      <div class="title">гҒ—гӮҠгҒЁгӮҠ гӮҒгҒ„гӮҚ</div>
      <div class="badge" id="badge">гӮӮгӮ“гҒ гҒ„ 1</div>
      <div class="desc">гӮ№гӮҝгғјгғҲгҒӢгӮүгӮҙгғјгғ«гҒҫгҒ§гҖҒгӮҶгҒігҒ§гҒ—гӮҠгҒЁгӮҠгҒ«гҒӘгӮӢгӮҲгҒҶгҒ«гҒӘгҒһгӮҠгҒҫгҒ—гӮҮгҒҶгҖӮ</div>
    </div>

    <!-- гӮҒгҒ„гӮҚ -->
    <div class="maze" id="maze">
      <!-- зҷҪгҒ„йҖҡи·ҜпјҲJSгҒ§зӣӨйқўгҒ”гҒЁгҒ«з”ҹжҲҗпјү -->
      <svg class="maze-paths" viewBox="0 0 1064 640">
        <g id="paths"></g>
      </svg>

      <!-- гҒӘгҒһгӮҠз·ҡгӮӘгғјгғҗгғјгғ¬гӮӨ -->
      <svg viewBox="0 0 1064 640" style="pointer-events:none;">
        <polyline id="trace" points=""></polyline>
        <line id="rubber" x1="0" y1="0" x2="0" y2="0" style="display:none"></line>
      </svg>

      <!-- гӮ№гӮҝгғјгғҲгғ»гӮҙгғјгғ« -->
      <div class="tab start">гӮ№гӮҝгғјгғҲ</div>
      <div class="tab goal">гӮҙгғјгғ«</div>

      <!-- гғҺгғјгғүгҒҜJSгҒ§з”ҹжҲҗ -->
    </div>

    <!-- гҒӮгҒӨгӮҒгҒҹ гҒ“гҒЁгҒ° -->
    <div class="track" id="track"></div>

    <!-- гғ•гғғгӮҝгғј -->
    <div class="foot">
      <div class="controls">
        <button class="btn hint" id="hintBtn">рҹ’Ў гғ’гғігғҲ</button>
        <button class="btn redo" id="redoBtn">вҶә гӮӮгҒҶгҒ„гҒЎгҒ©</button>
      </div>
      <div class="levels">
        <span class="lvlabel">гӮҒгҒ„гӮҚ</span>
        <button class="lvbtn on" data-d="easy">гҒӢгӮ“гҒҹгӮ“</button>
        <button class="lvbtn" data-d="hard">гӮҖгҒҡгҒӢгҒ—гҒ„</button>
      </div>
    </div>

  </div>
</div>

<!-- еӢқеҲ© -->
<div id="win">
  <div class="winbox">
    <div class="stars">вӯҗвӯҗвӯҗ</div>
    <div class="big">гҒӣгҒ„гҒӢгҒ„пјҒ</div>
    <div class="sub">гӮҙгғјгғ«гҒҫгҒ§ гҒ—гӮҠгҒЁгӮҠгҒ§гҒҚгҒҹгҒӯпјҒ</div>
    <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
      <button class="btn" id="againBtn">гӮӮгҒҶгҒ„гҒЎгҒ©</button>
      <button class="btn" id="nextBtn" style="background:#ffab2e;">гҒӨгҒҺгҒ®гӮҒгҒ„гӮҚ в–¶</button>
    </div>
  </div>
</div>

<script>
/* =========================================================
   зӣӨйқўгғ—гғӘгӮ»гғғгғҲпјҲиҝ·и·ҜгҒ”гҒЁгҒ«дҪҝгҒ„еҲҶгҒ‘гӮӢпјү
   pos   вҖҰ гғҺгғјгғүеә§жЁҷпјҲviewBox 1064x640 гҒ®дёӯпјү
   edges вҖҰ гҒӨгҒӘгҒҢгҒЈгҒҰгҒ„гӮӢгғҺгғјгғүгҒ®гғҡгӮў
   start/goal вҖҰ STARTгғ»GOAL гҒ®гғҺгғјгғүз•ӘеҸ·
   pic/nodeW/wordF/nodeR/corridorW/traceW/hit вҖҰ иҰӢгҒҹзӣ®гҒЁгҒӮгҒҹгӮҠеҲӨе®ҡгҒ®еӨ§гҒҚгҒ•
   stripe вҖҰ иғҢжҷҜгҒ®зёҰзёһ2иүІ
   stubs вҖҰ START/GOAL гҒӢгӮүеӨ–гҒёеҮәгӮӢйЈҫгӮҠгҒ®йҖҡи·Ҝ
   ========================================================= */
const BOARD_A = { // жЁҷжә–пјҲ11гғһгӮ№пјүвҖ” гӮӮгӮ“гҒ гҒ„1гҖң3
  pos:[
    {x:130,y:120},{x:400,y:120},{x:670,y:120},{x:930,y:120}, // 0,1,2,3
    {x:265,y:320},{x:530,y:320},{x:795,y:320},               // 4,5,6

  ],
  edges:[
    [0,1],[1,2],[2,3],[4,5],[5,6],[7,8],[8,9],[9,10],

  ],
  start:0, goal:10,
  pic:122, nodeW:180, wordF:19, nodeR:65, corridorW:68, traceW:40, hit:80,
  stripe:['#e3f4fc','#d2ecfa'],
  stubs:[[58,120,130,120],[930,520,1006,520]],
};
const BOARD_B = { // гӮҖгҒҡгҒӢгҒ—гҒ„пјҲ16гғһгӮ№гғ»гғ”гғігӮҜпјүвҖ” гӮӮгӮ“гҒ гҒ„4
  pos:[
    {x:130,y:90 },{x:400,y:90 },{x:670,y:90 },{x:930,y:90 }, // 0,1,2,3
    {x:130,y:243},{x:400,y:243},{x:670,y:243},{x:930,y:243}, // 4,5,6,7
    {x:130,y:397},{x:400,y:397},{x:670,y:397},{x:930,y:397}, // 8,9,10,11
    {x:130,y:550},{x:400,y:550},{x:670,y:550},{x:930,y:550}, // 12,13,14,15
  ],
  edges:[
    [0,1],[0,4],[1,2],[1,5],[2,3],[2,6],[3,7],
    [5,6],[5,9],[6,7],[6,10],[7,11],
    [4,8],[8,9],[8,12],[9,10],[9,13],[10,11],[10,14],[11,15],
    [12,13],[13,14],[14,15],
  ],
  start:0, goal:15,
  pic:94, nodeW:150, wordF:15, nodeR:50, corridorW:46, traceW:30, hit:66,
  stripe:['#fdeef2','#fadbe4'],
  stubs:[[58,90,130,90],[930,550,1006,550]],
};

/* зӣӨйқўгҒӢгӮүдҪңгӮүгӮҢгӮӢгҖҒгҒ„гҒҫгҒ®зҠ¶ж…ӢпјҲloadMaze гҒ§еҲҮгӮҠжӣҝгӮҸгӮӢпјү */
let BOARD = BOARD_A;
let START = BOARD_A.start, GOAL = BOARD_A.goal;
let adj = [];

/* иҝ·и·ҜгғҮгғјгӮҝпјҡlabels гҒҜдҪҚзҪ®0..10гҒ«зҪ®гҒҸ{зөө,гҒ“гҒЁгҒ°}гҖҒsolution гҒҜжӯЈи§Јгғ«гғјгғҲ(дҪҚзҪ®гҒ®дёҰгҒі) */
const MAZES = [ // вҶҗ tools/build_preview.py гҒҢз”ҹжҲҗJSONгҒӢгӮүиҮӘеӢ•еҹӢгӮҒиҫјгҒҝ
  { // гӮҸгҒӘ5 гҒӢгӮүгҒҷвҶ’гҒҷгҒ„гҒӢвҶ’гҒӢгҒ•вҶ’гҒ•гҒҸгӮүвҶ’гӮүгҒЈгҒұ
    board:BOARD_A,
    labels:[{img:'karasu',word:'гҒӢгӮүгҒҷ'},{img:'sushi',word:'гҒҷгҒ—'},{img:'saikoro',word:'гҒ•гҒ„гҒ“гӮҚ'},{img:'risu',word:'гӮҠгҒҷ'},{img:'suika',word:'гҒҷгҒ„гҒӢ'},{img:'kasa',word:'гҒӢгҒ•'},{img:'sai',word:'гҒ•гҒ„'},{img:'kagami',word:'гҒӢгҒҢгҒҝ'},{img:'randoseru',word:'гӮүгӮ“гҒ©гҒӣгӮӢ'},{img:'sakura',word:'гҒ•гҒҸгӮү'},{img:'rappa',word:'гӮүгҒЈгҒұ'}],
    solution:[0,4,5,9,10],
  },
  { // гӮҸгҒӘ4 гҒ«гӮҸгҒЁгӮҠвҶ’гӮҠгҒҷвҶ’гҒҷгҒ„гҒӢвҶ’гҒӢгҒ•вҶ’гҒ•гҒҸгӮүвҶ’гӮүгӮ“гҒ©гҒӣгӮӢ

  return c;
}

try{ if(navigator.audioSession) navigator.audioSession.type = 'playback'; }catch(e){}

let actx;
function ac(){
  actx = actx || new (window.AudioContext||window.webkitAudioContext)();
  // iOSгҒҜз”ҹжҲҗзӣҙеҫҢгӮ„дёӯж–ӯпјҲз”»йқўгғӯгғғгӮҜгғ»гӮҝгғ–еҲҮжӣҝпјүеҫҢгҒ« suspended гҒ«гҒӘгӮӢгҒ®гҒ§гҖҒжҜҺеӣһеҫ©её°гӮ’и©ҰгҒҝгӮӢ
  if(actx.state !== 'running') actx.resume();
  return actx;
}
function beep(freq, t0, dur, type='sine', vol=0.25){
  const c=ac(), o=c.createOscillator(), g=c.createGain();
  o.type=type; o.frequency.value=freq;
  o.connect(g); g.connect(c.destination);
  const s=c.currentTime+t0;
  g.gain.setValueAtTime(0,s);
  g.gain.linearRampToValueAtTime(vol,s+0.02);
  g.gain.exponentialRampToValueAtTime(0.0001,s+dur);
  o.start(s); o.stop(s+dur+0.02);
}

// йҹіеЈ°дёҖиҰ§гҒҜйқһеҗҢжңҹгҒ«еұҠгҒҸгҒ“гҒЁгҒҢгҒӮгӮӢгҒ®гҒ§ voiceschanged гҒ§гӮӮжӢҫгҒҶпјү
let jaVoice=null;
function pickJaVoice(){
  try{
    const vs=speechSynthesis.getVoices();
    jaVoice=vs.find(v=>v.lang&&v.lang.replace('_','-').startsWith('ja'))||null;
  }catch(e){}
}
if('speechSynthesis' in window){
  pickJaVoice();
  speechSynthesis.addEventListener('voiceschanged',pickJaVoice);
}

let speakSeq=0;
function speak(word){
  if(!('speechSynthesis' in window)) return;
  try{
    if(speechSynthesis.speaking||speechSynthesis.pending) speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(word);
    u.lang='ja-JP'; u.rate=0.85; u.pitch=1.25;
    if(jaVoice) u.voice=jaVoice;
    // iOSгҒҜ cancel() зӣҙеҫҢгҒ®еҗҢжңҹ speak() гҒҢйЈІгҒҝиҫјгҒҫгӮҢгӮӢгҒҹгӮҒе°‘гҒ—йҒ…гӮүгҒӣгӮӢгҖӮ
    // йҖЈз¶ҡгҒ§гҒӘгҒһгҒЈгҒҹгҒЁгҒҚгҒҜжңҖж–°гҒ®1иӘһгҒ гҒ‘зҷәи©ұгҒҷгӮӢпјҲseqгҒ§еҸӨгҒ„дәҲзҙ„гӮ’з ҙжЈ„пјү
    const id=++speakSeq;
    setTimeout(()=>{
      if(id!==speakSeq) return;
      try{
        if(speechSynthesis.paused) speechSynthesis.resume(); // дёӯж–ӯеҫҢ paused гҒ®гҒҫгҒҫй»ҷгӮӢзҷ–гҒёгҒ®дҝқйҷә
        speechSynthesis.speak(u);
      }catch(e){}
    },60);
  }catch(e){}
}

/* =========================================================
   зӣӨйқўпјҲйҖҡи·ҜSVGгғ»гғҺгғјгғүDOMгғ»гҒӮгҒҹгӮҠеҲӨе®ҡпјүгӮ’дҪңгӮҠгҒӘгҒҠгҒҷ
   ========================================================= */
const maze = document.getElementById('maze');
const nodeEls = [];

function buildBoard(board){
  BOARD = board;
  START = board.start; GOAL = board.goal;
  // йҡЈжҺҘгғӘгӮ№гғҲ
  adj = board.pos.map(()=>[]);
  board.edges.forEach(([a,b])=>{ adj[a].push(b); adj[b].push(a); });

  // еӨ§гҒҚгҒ•пјҲCSSеӨүж•°пјүвҖ” track гҒ®гҒ“гҒЁгҒ°гғҒгғғгғ—гӮӮеҸӮз…§гҒҷгӮӢгҒ®гҒ§зӣӨе…ЁдҪ“(.board)гҒ«иЁӯе®ҡгҒҷгӮӢ
  const boardEl = document.querySelector('.board');
  boardEl.style.setProperty('--pic',    board.pic  +'px');
  boardEl.style.setProperty('--nodew',  board.nodeW+'px');
  boardEl.style.setProperty('--wordf',  board.wordF+'px');
  boardEl.style.setProperty('--tracew', board.traceW+'px');

  // иғҢжҷҜгҒ®зёҰзёһ
  boardEl.style.background =
    `repeating-linear-gradient(90deg,${board.stripe[0]} 0px,${board.stripe[0]} 14px,`+
    `${board.stripe[1]} 14px,${board.stripe[1]} 28px)`;

  // зҷҪгҒ„йҖҡи·ҜпјҲз·ҡпјӢгғҺгғјгғүгҒ®дёёпјӢSTART/GOALгҒ®йЈҫгӮҠпјү
  let svg='';
  (board.stubs||[]).forEach(([x1,y1,x2,y2])=>{ svg+=`<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}"></line>`; });
  board.edges.forEach(([a,b])=>{ const A=board.pos[a],B=board.pos[b];
    svg+=`<line x1="${A.x}" y1="${A.y}" x2="${B.x}" y2="${B.y}"></line>`; });
  board.pos.forEach(p=>{ svg+=`<circle cx="${p.x}" cy="${p.y}" r="${board.nodeR}"></circle>`; });
  const g=document.getElementById('paths');
  g.setAttribute('style',`stroke:#fff;stroke-width:${board.corridorW}px;stroke-linecap:round;fill:#fff;`);
  g.innerHTML=svg;

  // гғҺгғјгғүDOMпјҲзӣӨйқўгҒ”гҒЁгҒ«дҪңгӮҠгҒӘгҒҠгҒҷпјү
  nodeEls.forEach(el=>el.remove());
  nodeEls.length=0;
  board.pos.forEach((p,i)=>{
    const el=document.createElement('div');
    el.className='node';
    el.style.left=(p.x-board.nodeW/2)+'px';
    el.style.top =(p.y-board.pic/2-5)+'px';
    el.dataset.i=i;
    el.innerHTML=`<div class="pic"><img alt="" draggable="false"></div>
                  <div class="word"><b></b></div>`;
    maze.appendChild(el);
    nodeEls.push(el);
  });

  // гӮ№гӮҝгғјгғҲгғ»гӮҙгғјгғ«гҒ® гҒөгҒ  гҒ® гҒҹгҒӢгҒ•
  document.querySelector('.tab.start').style.top=(board.pos[START].y-75)+'px';
  document.querySelector('.tab.goal' ).style.top=(board.pos[GOAL ].y-75)+'px';
}

/* иҝ·и·ҜгӮ’еҲҮгӮҠжӣҝгҒҲгӮӢ */
function loadMaze(k){
  mz = k;
  const m = MAZES[k];
  buildBoard(m.board);
  NODES = m.board.pos.map((p,i)=>({x:p.x, y:p.y, img:m.labels[i].img, word:m.labels[i].word}));
  SOLUTION = m.solution;
  nodeEls.forEach((el,i)=>{
    const img = el.querySelector('img');
    img.src = 'img/nodes/'+NODES[i].img+'.png';
    img.alt = NODES[i].word;
    el.querySelector('.word b').textContent = NODES[i].word;
  });
  const badge = document.getElementById('badge');
  if(badge) badge.textContent = 'гӮӮгӮ“гҒ гҒ„ '+played;  // дҪ•е•Ҹзӣ®гҒӢпјҲгҒ“гҒ®з”»йқўгӮ’й–ӢгҒ„гҒҰгҒӢгӮүгҒ®йҖҡгҒ—з•ӘеҸ·пјү
  reset();
}

const traceEl = document.getElementById('trace');
const trackEl = document.getElementById('track');

/* =========================================================
   гӮІгғјгғ зҠ¶ж…Ӣ
   ========================================================= */
let path = [START];

function render(){
  // гғҺгғјгғүгҒ®иҰӢгҒҹзӣ®
  nodeEls.forEach((el,i)=>{
    el.classList.remove('done','current');
    const idx = path.indexOf(i);
    if(idx>=0 && idx < path.length-1) el.classList.add('done');
    if(i===path[path.length-1]) el.classList.add('current');
  });
  // гҒӘгҒһгӮҠз·ҡ
  const pts = path.map(i=>`${NODES[i].x},${NODES[i].y}`).join(' ');
  traceEl.setAttribute('points',pts);
  // гҒӮгҒӨгӮҒгҒҹгҒ“гҒЁгҒ°
  trackEl.innerHTML='';
  path.forEach((i,k)=>{
    if(k>0){ const a=document.createElement('span'); a.className='arrow'; a.textContent='в–¶'; trackEl.appendChild(a); }
    const c=document.createElement('span'); c.className='chip'; c.textContent=NODES[i].word; trackEl.appendChild(c);
  });
}

/* гғҺгғјгғүгӮ’гҖҢйҖҡйҒҺгҖҚгҒ—гҒҹгҒЁгҒҚгҒ®еҮҰзҗҶпјҲгғүгғ©гғғгӮ°дёӯгҒ«е‘јгҒ°гӮҢгӮӢпјү */
function enterNode(i){
  const head = path[path.length-1];
  if(i===head) return;

  // гҒҷгҒ§гҒ«йҖҡгҒЈгҒҹе ҙжүҖ вҶ’ гҒқгҒ“гҒҫгҒ§ гӮӮгҒ©гӮӢпјҲгӮҶгҒігӮ’жҲ»гҒҷгҒЁжҲ»гӮҢгӮӢпјү
  const back = path.indexOf(i);
  if(back>=0){
    path = path.slice(0, back+1);
    beep(500,0,.08,'sine',.15);
    render();
    return;
  }

  // гҒӨгҒӘгҒҢгҒЈгҒҰгҒ„гӮӢпјҹ гҒӢгҒӨ гҒ—гӮҠгҒЁгӮҠOKпјҹ
  const connected = adj[head].includes(i);
  const ok = connected && shiritoriOK(NODES[head].word, NODES[i].word);

  if(ok){
    path.push(i);
    sndGood();
    speak(NODES[i].word);
    render();
    if(i===GOAL){ endDrag(); setTimeout(win, 450); }
  }else{
    // гҒ–гӮ“гҒӯгӮ“пјҲгҒ“гҒ®гғҺгғјгғүгҒӢгӮүе…ҲгҒ«гҒҜ гҒҷгҒҷгӮҒгҒӘгҒ„пјү
    sndBad();
    const el=nodeEls[i];
    el.classList.add('wrong');
    setTimeout(()=>el.classList.remove('wrong'),480);
  }
}

/* =========================================================
   гӮҶгҒігҒ§ гҒӘгҒһгӮӢпјҲгғқгӮӨгғігӮҝгғјпјҸгӮҝгғғгғҒ гғүгғ©гғғгӮ°пјү
   ========================================================= */
const rubber = document.getElementById('rubber');
let dragging = false, lastZone = -1;

function toSvg(e){
  const r = maze.getBoundingClientRect();
  return {
    x:(e.clientX - r.left) / r.width  * 1064,
    y:(e.clientY - r.top ) / r.height * 640,
  };
}
function nodeAt(p){
  // еҚҠеҫ„еҶ…гҒ§гҒ„гҒЎгҒ°гӮ“иҝ‘гҒ„гғҺгғјгғүгӮ’йҒёгҒ¶пјҲгғһгӮ№гҒҢеҜҶгҒ§гӮӮеҸ–гӮҠйҒ•гҒҲгҒӘгҒ„пјү
  const R=BOARD.hit; let best=-1, bd=R*R;
  for(let i=0;i<NODES.length;i++){
    const dx=p.x-NODES[i].x, dy=p.y-NODES[i].y, d=dx*dx+dy*dy;
    if(d<=bd){ bd=d; best=i; }
  }
  return best;
}
function drawRubber(p){
  const h = NODES[path[path.length-1]];
  rubber.setAttribute('x1',h.x); rubber.setAttribute('y1',h.y);
  rubber.setAttribute('x2',p.x); rubber.setAttribute('y2',p.y);
  rubber.style.display='';
}
function endDrag(){
  dragging=false; lastZone=-1; rubber.style.display='none';
}
function isWinOpen(){ return document.getElementById('win').classList.contains('show'); }

maze.addEventListener('pointerdown', e=>{
  if(isWinOpen()) return;
  ac();
  dragging = true;
  try{ maze.setPointerCapture(e.pointerId); }catch(_){}
  const p = toSvg(e);
  lastZone = nodeAt(p);
  if(lastZone>=0) enterNode(lastZone);
  drawRubber(p);
  e.preventDefault();
});
maze.addEventListener('pointermove', e=>{
  if(!dragging) return;
  const p = toSvg(e);
  const z = nodeAt(p);
  if(z !== lastZone){          // ж–°гҒ—гҒ„гӮҫгғјгғігҒ«е…ҘгҒЈгҒҹгҒЁгҒҚгҒ гҒ‘еҲӨе®ҡ
    lastZone = z;
    if(z>=0) enterNode(z);
  }
  drawRubber(p);
  e.preventDefault();
});
function onUp(e){ if(!dragging) return; endDrag(); if(e&&e.preventDefault) e.preventDefault(); }
maze.addEventListener('pointerup', onUp);
maze.addEventListener('pointercancel', onUp);

/* гғ’гғігғҲпјҡгҒӨгҒҺгҒ®жӯЈи§ЈгғҺгғјгғүгӮ’ гҒІгҒӢгӮүгҒӣгӮӢ */
function hint(){
  const head = path[path.length-1];
  // гҒ„гҒҫгҒ®гғ‘гӮ№гҒҢжӯЈи§Јгғ«гғјгғҲгҒ®йҖ”дёӯгҒӢгҒ©гҒҶгҒӢ
  let next=null;
  const si = SOLUTION.indexOf(head);
  if(si>=0 && si<SOLUTION.length-1 && SOLUTION.slice(0,si+1).every((v,k)=>v===path[k])){
    next = SOLUTION[si+1];
  }
  if(next===null){
    // гғ«гғјгғҲгҒӢгӮүеӨ–гӮҢгҒҰгҒ„гӮӢ вҶ’ гӮ№гӮҝгғјгғҲгҒёжҲ»гӮӢгӮҲгҒҶдҝғгҒҷ
    const startEl=nodeEls[path[0]];
    startEl.classList.add('hintable');
    setTimeout(()=>startEl.classList.remove('hintable'),2000);
    beep(400,0,.1,'sine',.15);
    return;
  }
  const el=nodeEls[next];
  el.classList.add('hintable');
  beep(880,0,.1,'sine',.15);
  setTimeout(()=>el.classList.remove('hintable'),2000);
}

/* гғӘгӮ»гғғгғҲ */
function reset(){
  path=[START];
  document.getElementById('win').classList.remove('show');
  render();
}

/* еӢқеҲ©жј”еҮә */
function win(){
  sndWin();
  speak('гҒӣгҒ„гҒӢгҒ„пјҒ гӮҲгҒҸгҒ§гҒҚгҒҫгҒ—гҒҹпјҒ');
  document.getElementById('win').classList.add('show');
  confetti();
}
function confetti(){
  const colors=['#ffd23f','#35b5ea','#3fbf6a','#ff8c1a','#ff5d8f','#a06bff'];
  for(let k=0;k<80;k++){
    const c=document.createElement('div');
    c.className='confetti';
    c.style.left=Math.random()*100+'vw';
    c.style.background=colors[k%colors.length];
    c.style.transform=`rotate(${Math.random()*360}deg)`;
    document.body.appendChild(c);
    const dur=2+Math.random()*2, delay=Math.random()*0.6;
    c.animate([
      {transform:`translateY(0) rotate(0deg)`,opacity:1},
      {transform:`translateY(105vh) rotate(${720+Math.random()*360}deg)`,opacity:1}
    ],{duration:dur*1000,delay:delay*1000,easing:'ease-in'});
    setTimeout(()=>c.remove(),(dur+delay)*1000+100);
  }
}

document.getElementById('hintBtn').addEventListener('click',()=>{ac();hint();});
document.getElementById('redoBtn').addEventListener('click',reset);
document.getElementById('againBtn').addEventListener('click',reset);
/* =========================================================
   гғ©гғігғҖгғ еҮәйЎҢпјҲгҒӢгӮ“гҒҹгӮ“пјқзӣӨйқўA / гӮҖгҒҡгҒӢгҒ—гҒ„пјқзӣӨйқўBпјү
   гӮ·гғЈгғғгғ•гғ«гҒ—гҒҹгҖҢиўӢгҖҚгҒӢгӮүй ҶгҒ«еҮәгҒҷ: е…Ёе•ҸеҮәгӮӢгҒҫгҒ§еҗҢгҒҳе•ҸйЎҢгҒҜеҮәгҒҡгҖҒ
   иўӢгӮ’дҪңгӮҠзӣҙгҒҷгҒЁгҒҚгӮӮзӣҙеүҚгҒ®е•ҸйЎҢгҒҢйҖЈз¶ҡгҒ—гҒӘгҒ„гӮҲгҒҶгҒ«гҒҷгӮӢ
   ========================================================= */
const POOLS={easy:[],hard:[]};
MAZES.forEach((m,i)=>{ (m.board===BOARD_A?POOLS.easy:POOLS.hard).push(i); });
let diff='easy', bag=[], played=0;
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function nextMaze(){
  if(!bag.length){
    bag=shuffle(POOLS[diff].slice());
    if(bag.length>1 && bag[bag.length-1]===mz) bag.unshift(bag.pop());
  }
  played++;
  loadMaze(bag.pop());
}
function setDiff(d){
  diff=d; bag=[];
  document.querySelectorAll('.lvbtn').forEach(b=>b.classList.toggle('on', b.dataset.d===d));
  nextMaze();
}

document.getElementById('nextBtn').addEventListener('click',()=>{ac();nextMaze();});
document.querySelectorAll('.lvbtn').forEach(b=>{
  b.addEventListener('click',()=>{ ac(); setDiff(b.dataset.d); });
});
// гӮҝгғғгғ—гҒ®гҒҹгҒігҒ«йҹігҒ®еҫ©её°гӮ’и©ҰгҒҝгӮӢпјҲiOSгҒҜдёӯж–ӯеҫҢ suspended гҒ«жҲ»гӮӢгҒҹгӮҒ once гҒ«гҒ—гҒӘгҒ„пјүгҖӮ
// iOSгҒҜгҖҢжңҖеҲқгҒ®еҶҚз”ҹгҖҚгҒҢгӮҝгғғгғ—гғҸгғігғүгғ©еҶ…гҒ§е§ӢгҒҫгӮүгҒӘгҒ„гҒЁжҚЁгҒҰгӮүгӮҢгӮӢгҒ®гҒ§гҖҒ
// еҲқеӣһгӮҝгғғгғ—гҒ§з„Ўйҹігғҗгғғгғ•гӮЎгӮ’1гҒӨеҚіжҷӮеҶҚз”ҹгҒ—гҒҰеҮәеҠӣзөҢи·ҜгӮ’зўәз«ӢгҒҷгӮӢпјҲ1йҹізӣ®гҒҢйіҙгӮүгҒӘгҒ„еҜҫзӯ–пјүгҖӮ
// гӮҲгҒҝгҒӮгҒ’гӮӮеҗҢж§ҳгҒ«гҖҒз„ЎйҹігҒ®зҷәи©ұгҒ§дёҖеәҰгҒ гҒ‘и§ЈйҢ гҒҷгӮӢ
let audioWarmed=false, speechUnlocked=false;
document.body.addEventListener('pointerdown',()=>{
  const c=ac();
  if(!audioWarmed){
    audioWarmed=true;
    try{
      const s=c.createBufferSource();
      s.buffer=c.createBuffer(1,1,22050);
      s.connect(c.destination); s.start(0);
    }catch(e){}
  }
  if(!speechUnlocked && 'speechSynthesis' in window){
    speechUnlocked=true;
    try{ const u=new SpeechSynthesisUtterance(' '); u.volume=0; speechSynthesis.speak(u); }catch(e){}
  }
});

/* =========================================================
   з”»йқўгҒ®зёҰгғ»жЁӘ дёЎж–№гҒ«еҸҺгҒҫгӮӢгӮҲгҒҶгҒ«гӮ№гӮұгғјгғ«
   ========================================================= */
function fit(){
  const stage=document.getElementById('stage');
  const bw=1120+8;                                        // зӣӨгҒ®е№…пјӢе·ҰеҸідҪҷзҷҪ
  const bh=document.querySelector('.board').offsetHeight+12; // зӣӨгҒ®й«ҳгҒ•пјӢдёҠдёӢдҪҷзҷҪ
  const s=Math.min(1, window.innerWidth/bw, window.innerHeight/bh);
  stage.style.transform=`scale(${s})`;
  // transform гҒҜгғ¬гӮӨгӮўгӮҰгғҲдёҠгҒ®й«ҳгҒ•гӮ’еӨүгҒҲгҒӘгҒ„гҒ®гҒ§гҖҒзё®е°ҸеҫҢгҒ®е®ҹй«ҳгҒ•гӮ’ body гҒ«
  // жҳҺзӨәгҒ—гҒӘгҒ„гҒЁдёӢгҒ«з©әзҷҪгӮ№гӮҜгғӯгғјгғ«гҒҢж®ӢгӮӢ
  document.body.style.height=Math.floor(bh*s)+'px';
}
window.addEventListener('resize',fit);
if(document.fonts && document.fonts.ready) document.fonts.ready.then(fit); // Webгғ•гӮ©гғігғҲйҒ©з”ЁеҫҢгҒ«й«ҳгҒ•гҒҢзўәе®ҡ

setDiff('easy');
fit();
</script>
